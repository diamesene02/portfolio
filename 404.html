<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable | D.Sene</title>
<link rel="icon" href="/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050508;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.container{text-align:center;padding:2rem}
.code{font-size:8rem;font-weight:900;letter-spacing:-4px;background:linear-gradient(135deg,#F59E0B,#D97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.msg{font-size:1.2rem;color:#888;margin:1rem 0 2rem}
a{display:inline-block;padding:12px 32px;background:#F59E0B;color:#050508;text-decoration:none;border-radius:8px;font-weight:600;transition:all .3s}
a:hover{background:#D97706;transform:translateY(-2px)}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.8}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
<div class="code">404</div>
<p class="msg">Cette page n'existe pas. Perdu dans l'espace ?</p>
<a href="/">Retour au portfolio</a>
</div>
<script>
const s=document.getElementById('stars');
for(let i=0;i<80;i++){const d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.animationDelay=Math.random()*3+'s';d.style.animationDuration=(2+Math.random()*3)+'s';s.appendChild(d)}
</script>
</body>
</html>
